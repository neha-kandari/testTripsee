# ─── Tripsee — Nginx Reverse Proxy Config ─────────────────────────────────────
# Place this file at: /etc/nginx/sites-available/tripsee
# Then: sudo ln -s /etc/nginx/sites-available/tripsee /etc/nginx/sites-enabled/
# And:  sudo nginx -t && sudo systemctl reload nginx
#
# NOTE: If using Coolify with built-in proxy (Traefik/Nginx),
# set the domain & port in Coolify's UI instead — this file is for
# self-managed Nginx in front of Coolify.
# ──────────────────────────────────────────────────────────────────────────────

# Upstream Next.js app (running on port 3000 via Docker)
upstream nextjs_app {
    server 127.0.0.1:3000;
    keepalive 64;
}

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL (managed by Certbot / Let's Encrypt or Coolify)
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Content-Type-Options  "nosniff"                          always;
    add_header X-Frame-Options         "SAMEORIGIN"                       always;
    add_header X-XSS-Protection        "1; mode=block"                    always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin"  always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Gzip compression ──────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   256;
    gzip_types
        application/javascript
        application/json
        application/xml
        image/svg+xml
        text/css
        text/html
        text/javascript
        text/plain
        font/woff
        font/woff2;

    # ── Client-side cache: 1 year for hashed static assets ───────────────────
    location /_next/static/ {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── Next.js image optimizer endpoint — cached 30 days ────────────────────
    location /_next/image {
        proxy_pass http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=2592000, stale-while-revalidate=86400";
    }

    # ── Public static files (images, videos, fonts) — 1 year ─────────────────
    location ~* \.(webp|jpg|jpeg|png|gif|svg|ico|woff|woff2|mp4|webm|pdf)$ {
        proxy_pass http://nextjs_app;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── API rate limiting ─────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── All other requests (HTML pages) ──────────────────────────────────────
    location / {
        proxy_pass         http://nextjs_app;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # ── Prevent nginx from ever caching HTML ────────────────────────────
        # Next.js already sends Cache-Control: no-store via next.config.ts.
        # These directives ensure nginx itself never stores a local copy either.
        proxy_no_cache     1;
        proxy_cache_bypass 1;

        # Explicitly re-send no-store so it survives any upstream header stripping.
        # 'always' applies the header even on error responses (4xx/5xx).
        add_header Cache-Control "no-store, must-revalidate" always;
        add_header Pragma        "no-cache"                  always;
        add_header Expires       "0"                         always;
    }
}
